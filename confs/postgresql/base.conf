# This is the base PostgreSQL config file
# On deployment you should create a similar file adding also your configs
# And point to it using POSTGRES_CONFIG_FILE in .env

# include file created by initdb. Note in the main conf this must be enclosed in quotes
include_if_exists '/var/lib/postgresql/data/postgresql.conf'

# we have a specific hba file. Note this is the file name as seen from the PostgreSQL container
# as defined in the volume mapping in docker-compose.yml
hba_file='/etc/pg_hba.conf'
